<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="author" content="Student" />
  <meta name="description" content="Guestbook for Student." />
  <title>Guestbook — Student</title>
  <link rel="icon" href="/assets/icons/neu_icon.png" type="image/png" />
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>
  <header class="site-header">
    <nav class="nav container" aria-label="Primary">
      <a class="brand" href="/">Student's Home Page</a>
      <ul class="nav-list">
        <li><a href="/about.html">About</a></li>
        <li><a href="/gallery.html">Gallery</a></li>
        <li><a href="/links.html">CS5610 Links</a></li>
        <li><a aria-current="page" href="/guestbook.html">Guestbook</a></li>
        <li><button id="theme" class="theme-toggle" type="button" aria-label="Toggle color theme">Theme</button></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <h1 class="section-title">Guestbook</h1>

    <section class="gb-wrap" aria-labelledby="gb-heading">
      <h2 id="gb-heading" class="section-title" style="margin-top:0">Leave a message</h2>

      <form id="gb-form" class="gb-form" novalidate>
        <div class="gb-row">
          <label for="nickname">Nickname</label>
          <input id="nickname" name="nickname" type="text" required maxlength="40" autocomplete="name" />
        </div>
        <div class="gb-row">
          <label for="message">Message (140 characters max)</label>
          <textarea id="message" name="message" maxlength="140" required></textarea>
        </div>
        <div class="gb-actions">
          <button class="btn" type="submit">Post</button>
          <p id="gb-status" class="muted" role="status" aria-live="polite"></p>
        </div>
      </form>

      <div id="gb-list" class="gb-list" aria-live="polite"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>© <span id="year"></span> Student</small>
    </div>
  </footer>

  <script defer src="/scripts/app.js"></script>
</body>
</html>
