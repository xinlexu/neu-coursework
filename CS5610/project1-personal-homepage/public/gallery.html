<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="author" content="Student" />
  <meta name="description" content="Photo gallery of Student." />
  <title>Gallery — Student</title>
  <link rel="icon" href="/assets/icons/neu_icon.png" type="image/png" />
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>
  <header class="site-header">
    <nav class="nav container" aria-label="Primary">
      <a class="brand" href="/">Student's Home Page</a>
      <ul class="nav-list">
        <li><a href="/about.html">About</a></li>
        <li><a aria-current="page" href="/gallery.html">Gallery</a></li>
        <li><a href="/links.html">CS5610 Links</a></li>
        <li><a href="/guestbook.html">Guestbook</a></li>
        <li><button id="theme" class="theme-toggle" type="button" aria-label="Toggle color theme">Theme</button></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <h1 class="section-title">Gallery</h1>
    <div class="grid gallery-grid" id="gallery">
      <button class="card img-btn thumb-wrap" data-full="/assets/images/pet_pewpew.jpg" aria-label="Open image: PewPew on a couch">
        <img class="thumb" src="/assets/images/pet_pewpew.jpg" alt="PewPew the cat on a couch" loading="lazy" />
      </button>
      <button class="card img-btn thumb-wrap" data-full="/assets/images/pet_pewpew2.jpg" aria-label="Open image: PewPew looking at camera">
        <img class="thumb" src="/assets/images/pet_pewpew2.jpg" alt="PewPew looking at the camera" loading="lazy" />
      </button>
      <button class="card img-btn thumb-wrap" data-full="/assets/images/pet_chinchillas.jpg" aria-label="Open image: Two chinchillas">
        <img class="thumb" src="/assets/images/pet_chinchillas.jpg" alt="Two chinchillas" loading="lazy" />
      </button>
      <button class="card img-btn thumb-wrap" data-full="/assets/images/hobby_carracing.jpg" aria-label="Open image: Car racing hobby">
        <img class="thumb" src="/assets/images/hobby_carracing.jpg" alt="Car racing hobby" loading="lazy" />
      </button>
      <button class="card img-btn thumb-wrap" data-full="/assets/images/hobby_cooking.jpg" aria-label="Open image: Cooking hobby">
        <img class="thumb" src="/assets/images/hobby_cooking.jpg" alt="Cooking hobby" loading="lazy" />
      </button>
      <button class="card img-btn thumb-wrap" data-full="/assets/images/hobby_fishing.jpg" aria-label="Open image: Fishing hobby">
        <img class="thumb" src="/assets/images/hobby_fishing.jpg" alt="Fishing hobby" loading="lazy" />
      </button>
      <button class="card img-btn thumb-wrap" data-full="/assets/images/hobby_gun.jpg" aria-label="Open image: Target shooting hobby">
        <img class="thumb" src="/assets/images/hobby_gun.jpg" alt="Target shooting hobby" loading="lazy" />
      </button>
      <button class="card img-btn thumb-wrap" data-full="/assets/images/travel_dog_sledding.jpg" aria-label="Open image: Dog sledding trip">
        <img class="thumb" src="/assets/images/travel_dog_sledding.jpg" alt="Dog sledding trip" loading="lazy" />
      </button>
    </div>

    <div id="lightbox" class="lightbox" hidden>
      <div class="lightbox-inner">
        <img
          id="lightbox-img"
          class="lightbox-img"
          src="data:image/gif;base64,R0lGODlhAQABAAAAACw="
          alt="Expanded gallery image"
        />
        <div class="lightbox-controls">
          <button id="prev" class="btn" type="button" aria-label="Previous image">Prev</button>
          <button id="next" class="btn" type="button" aria-label="Next image">Next</button>
          <button id="lightbox-close" class="btn" type="button" aria-label="Close">Close</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>© <span id="year"></span> Student</small>
    </div>
  </footer>

  <script defer src="/scripts/app.js"></script>
</body>
</html>
