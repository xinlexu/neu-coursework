services:
  srft-server:
    build: .
    container_name: srft-server
    hostname: srft-server
    command: bash -c "tc qdisc add dev eth0 root netem loss 4% && sleep infinity"
    volumes:
      - ./:/srftproject
    working_dir: /srftproject
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      srft-net:
        ipv4_address: 172.16.0.2
        aliases:
          - srft-server.local

  srft-client:
    build: .
    container_name: srft-client
    hostname: srft-client
    command: sleep infinity
    volumes:
      - ./:/srftproject
    working_dir: /srftproject
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      srft-net:
        ipv4_address: 172.16.0.3
        aliases:
          - srft-client.local
  srft-attacker:
    build: .
    container_name: srft-attacker
    hostname: srft-attacker
    command: sleep infinity
    volumes:
      - ./:/srftproject
    working_dir: /srftproject
    cap_add:
      - ALL
    privileged: true
    network_mode: host

networks:
  srft-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.0.0/16